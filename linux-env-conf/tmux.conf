# RRBB014, Minseo Gong's tmux configuration
# Updated for tmux 3.6

# ─────────────────────────────────────────
# 기본 설정
# ─────────────────────────────────────────

# config 리로드 (Ctrl+a + r)
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# 새 pane/window는 현재 경로로 열기
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Prefix: Ctrl+b -> Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 히스토리 크기
set -g history-limit 1000000

# 터미널 색상
set -ga terminal-overrides ',xterm-256color:Tc'

# ─────────────────────────────────────────
# 마우스 & 스크롤바 (tmux 3.6 신기능)
# ─────────────────────────────────────────

set -g mouse on
set -g pane-scrollbars on

# ─────────────────────────────────────────
# Pane 이동 (vim 키)
# ─────────────────────────────────────────

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Space select-pane -t :.+

# ─────────────────────────────────────────
# 윈도우 이동
# ─────────────────────────────────────────

bind Tab next-window
bind -r C-Space next-layout

# ─────────────────────────────────────────
# Pane 크기 조절
# ─────────────────────────────────────────

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─────────────────────────────────────────
# Pane 분할
# ─────────────────────────────────────────

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ─────────────────────────────────────────
# vi 복사 모드 (tmux 3.6 문법)
# ─────────────────────────────────────────

set -g mode-keys vi

bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "xclip -selection clipboard"
bind -T copy-mode-vi 'r' send -X rectangle-toggle

# ─────────────────────────────────────────
# 클립보드 연동 (xclip)
# ─────────────────────────────────────────

# Ctrl+a + Ctrl+c -> 시스템 클립보드로 복사
bind C-c run "tmux save-buffer - | xclip -i -sel clipboard"

# Ctrl+a + Ctrl+v -> 시스템 클립보드에서 붙여넣기
bind C-v run "tmux set-buffer \"$(xclip -o -sel clipboard)\"; tmux paste-buffer"

bind P paste-buffer

# ─────────────────────────────────────────
# Popup 창
# ─────────────────────────────────────────

# lazygit popup (Ctrl+a + g)
bind g display-popup -d '#{pane_current_path}' -w 90% -h 90% -E lazygit

# 빠른 쉘 popup (Ctrl+a + e)
bind e display-popup -d '#{pane_current_path}' -w 80% -h 80% -E bash

# Claude Code popup - 세션 유지 버전 (Ctrl+a + y)
# detach(Ctrl+a + d)해도 세션 유지, 다시 누르면 재접속
# popup 안에서 실수로 또 누르면 중첩 방지 (TMUX_POPUP 환경변수로 감지)
bind y if-shell '[ -n "$TMUX_POPUP" ]' '' \
  'run-shell "SESSION=\"claude-$(echo \#{pane_current_path} | md5sum | cut -c1-8)\"; \
  tmux has-session -t \"$SESSION\" 2>/dev/null || \
  tmux new-session -d -s \"$SESSION\" -c \"\#{pane_current_path}\" \"claude\"; \
  tmux display-popup -e TMUX_POPUP=1 -w 90% -h 90% -E \"tmux attach -t $SESSION\""'

# ─────────────────────────────────────────
# URL 열기 (fzf + xdg-open)
# ─────────────────────────────────────────

# Ctrl+a + u -> 현재 pane의 URL 목록 fzf로 선택 후 브라우저 열기
bind u capture-pane -J \; \
  save-buffer /tmp/tmux-buffer \; \
  split-window -v "grep -oE 'https?://[^ ]+' /tmp/tmux-buffer | fzf | xargs xdg-open"

# ─────────────────────────────────────────
# 디자인
# ─────────────────────────────────────────

# 비활성/활성 pane 색상
set -g window-style 'fg=colour247,bg=colour236'
set -g window-active-style 'fg=colour250,bg=black'

# Pane 테두리 색상 (tmux 3.6 문법으로 수정)
set -g pane-border-style fg=black
set -g pane-active-border-style fg=colour141

# ─────────────────────────────────────────
# tmux-resurrect (세션 저장/복원)
# ─────────────────────────────────────────

run-shell ~/tmux-resurrect/resurrect.tmux
